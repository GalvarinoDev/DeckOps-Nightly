name: Build LAN Launcher (Windows exe)

on:
  workflow_dispatch:
  push:
    paths:
      - 'src/launcher_plut_win.py'
      - '.github/workflows/build-lan-launcher.yml'

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install nuitka PyQt5 pygame XInput-Python

      - name: Build executable
        run: |
          python -m nuitka --onefile --windows-console-mode=disable --include-module=XInput --output-filename=DeckOps_Offline.exe --output-dir=dist src/launcher_plut_win.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: DeckOps-Offline-Launcher
          path: dist/DeckOps_Offline.exe
